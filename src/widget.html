    <script>
      (function () {
        function formatReason(reason) {
          var unknown =
            (window.OTACLAW_CONFIG &&
              window.OTACLAW_CONFIG.i18n &&
              window.OTACLAW_CONFIG.i18n.unknownError) ||
            "Unknown error";
          if (!reason) return unknown;
          if (typeof reason === "string") return reason;
          if (reason.message) return reason.message;
          try {
            return JSON.stringify(reason);
          } catch (_) {
            return String(reason);
          }
        }
        window.__OTACLAW_LAST_ERROR = "";
        window.addEventListener("error", function (ev) {
          var message = formatReason(ev.error || ev.message);
          var source = ev.filename
            ? " @ " + ev.filename + ":" + (ev.lineno || "?")
            : "";
          window.__OTACLAW_LAST_ERROR = message + source;
        });
        window.addEventListener("unhandledrejection", function (ev) {
          window.__OTACLAW_LAST_ERROR =
            "Unhandled promise rejection: " + formatReason(ev.reason);
        });
      })();
    </script>

  <body class="use-otacon-sprite otaclaw-widget">
    <script>
      (function () {
        var isEmotionsDemo = /[?&]emotions=1(?=&|$)/.test(location.search);
        if (!isEmotionsDemo) {
          document.body.classList.add("widget-waiting");
        } else {
          document.body.classList.add("emotions-demo");
          window.__otaclawBootComplete = true;
          /* Single view: hide overlays; layout: Hal large, bubble just above */
          var s = document.createElement("style");
          s.textContent = [
            ".emotions-demo #boot-black-overlay,.emotions-demo #widget-sprite-overlay{display:none!important}",
            ".emotions-demo .sprite-viewport{--sprite-viewport-size:min(480px,90vh)!important}",
            ".emotions-demo .sprite-viewport-wrapper{display:flex!important;flex-direction:column!important;align-items:center!important;gap:0!important}",
            ".emotions-demo .speech-bubble{position:relative!important;top:auto!important;transform:none!important;margin-top:0!important;margin-bottom:8px!important}",
            ".emotions-demo #sprite .otacon-frame{--otacon-scale:6!important}"
          ].join("\n");
          document.head.appendChild(s);
        }
        window.__otaclawBootStartTime = Date.now();
      })();
    </script>
    <script>
      (function () {
        window.addEventListener("pageshow", function (e) {
          if (e.persisted) {
            location.reload();
          }
        });
      })();
    </script>
    <div id="otaclaw-wrapper" class="otaclaw-widget-main">
        <div id="otaclaw" class="otaclaw-container">
          <div class="sprite-container">
            <div id="sprite" class="sprite-sheet-container state-idle">
              <div class="sprite-viewport-wrapper">
                <div id="speech-bubble" class="speech-bubble">
                  <span id="speech-text" class="speech-text"></span>
                </div>
                <div id="widget-check-config-icon" class="widget-check-config-icon" aria-hidden="true"></div>
                <div id="sprite-viewport" class="sprite-viewport">
                  <div class="otacon-frame">
                    <div
                      id="eyes-layer"
                      class="eyes-layer"
                      aria-hidden="true"
                    ></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    <div
      id="touch-overlay"
      class="touch-overlay"
      aria-label="Touch to interact"
    ></div>
    <div id="widget-connection-msg" class="widget-connection-msg hidden"></div>
    <div id="connection-overlay" class="connection-overlay hidden">
      <div class="connection-content">
        <div class="sprite-sheet-container connecting">
          <div class="otacon-frame"></div>
        </div>
        <p class="connection-text" data-i18n="connecting">Connecting…</p>
      </div>
    </div>
    <div id="config-error" class="config-overlay hidden">
      <div class="config-content">
        <h2>Configuration Required</h2>
        <p class="config-msg" data-i18n="configRequired">
          Edit <code>js/config.js</code> with your OpenClaw host.
        </p>
        <p
          id="runtime-error-hint"
          class="config-msg"
          style="font-size: 12px; opacity: 0.9"
        ></p>
      </div>
    </div>
    <div id="status-bar" class="status-bar status-bar-mini">
      <span id="connection-status" class="status-indicator disconnected">
        <span class="status-dot"></span>
      </span>
    </div>
    <script>
      (function () {
        var hint = document.getElementById("runtime-error-hint");
        if (!hint) return;
        // Use a longer interval and clear on page unload to reduce overhead
        var errorInterval = setInterval(function () {
          if (window.__OTACLAW_LAST_ERROR) {
            var prefix =
              (window.OTACLAW_CONFIG &&
                window.OTACLAW_CONFIG.i18n &&
                window.OTACLAW_CONFIG.i18n.runtimeError) ||
              "Runtime error: ";
            hint.textContent = prefix + window.__OTACLAW_LAST_ERROR;
          }
        }, 5000);
        window.addEventListener("beforeunload", function () {
          clearInterval(errorInterval);
        });
      })();
    </script>
    <script>
      (function () {
        function applyI18n() {
          var cfg = window.OTACLAW_CONFIG;
          if (cfg && cfg.i18n) {
            document.querySelectorAll("[data-i18n]").forEach(function (el) {
              var key = el.getAttribute("data-i18n");
              if (cfg.i18n[key]) el.textContent = cfg.i18n[key];
            });
          }
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", applyI18n);
        } else {
          applyI18n();
        }
      })();
    </script>
