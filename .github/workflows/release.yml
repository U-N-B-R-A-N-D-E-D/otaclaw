name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Build (verify)
        run: npm run build

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from commits since last tag
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "- Initial release" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" =~ refs/tags/v(.+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Error: Could not determine version"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined version: $VERSION"

      - name: Update package.json version
        continue-on-error: true  # Version might already be set
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version || echo "Version already set"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}" || true

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ steps.version.outputs.VERSION }}"
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's New in ${{ steps.version.outputs.VERSION }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd otaclaw
            npm install
            ```

            ## Quick Start

            See [README.md](https://github.com/${{ github.repository }}#quick-start) for setup instructions.

            ## Assets

            - Source code (zip)
            - Source code (tar.gz)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
          files: |
            LICENSE
            README.md

      - name: Update major version tag
        if: ${{ !contains(steps.version.outputs.VERSION, 'alpha') && !contains(steps.version.outputs.VERSION, 'beta') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MAJOR_VERSION=$(echo "${{ steps.version.outputs.VERSION }}" | cut -d. -f1)
          git tag -fa "v${MAJOR_VERSION}" -m "Update v${MAJOR_VERSION} to ${{ steps.version.outputs.VERSION }}"
          git push -f origin "v${MAJOR_VERSION}" || true

      - name: Post release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release URL**: ${{ steps.create_release.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY
